version: 2

# CAMADA BRONZE — dados brutos carregados pelo Airflow via Python (to_sql).
# Fonte: Open-Meteo API (ERA5/ICON) — gratuita, sem token.

sources:
  - name: bronze
    schema: bronze
    description: "Dados horários da Open-Meteo (ERA5/ICON) para o ponto Tomé-Açu/PA."

    tables:
      - name: raw_openmeteo
        description: >
          Uma linha por hora para o ponto lat=-2.42, lon=-48.15.
          Formato columnar da API convertido para tabular pelo flatten_data.py.
        columns:
          - name: _loaded_at
            description: "Timestamp UTC de quando o registro foi carregado."
          - name: _source
            description: "Identificador da fonte (openmeteo)."
          - name: time
            description: "Timestamp ISO 8601 da medição horária."
          - name: latitude
            description: "Latitude do ponto geográfico."
          - name: longitude
            description: "Longitude do ponto geográfico."
        tests:
          - not_null:
              column_name: _loaded_at
          - not_null:
              column_name: time
