name: etl
version: "1.0.0"
config-version: 2

profile: etl

model-paths:  ["models"]
macro-paths:  ["macros"]
seed-paths:   ["seeds"]
test-paths:   ["tests"]

target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

models:
  etl:
    # Bronze: sem modelos SQL — apenas sources.yml (dados carregados pelo Airflow)

    silver:
      +materialized: view      # leve, recalculado a cada run
      +schema: silver

    gold:
      +materialized: table     # persistido, otimizado para leitura
      +schema: gold
