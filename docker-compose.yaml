services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - etl_network

  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    depends_on:
      postgres:
        condition: service_healthy
    user: "50000:0"
    env_file:
      - config/.env          # expõe DB_PASSWORD, API_KEY e AIRFLOW__WEBSERVER__SECRET_KEY (necessário para o dbt)
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DB_HOST: postgres
      DBT_PROFILES_DIR: /opt/airflow/config/dbt
      DBT_LOG_PATH: /tmp/dbt-logs
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./config:/opt/airflow/config
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./dbt:/opt/airflow/dbt        # dbt instalado no Airflow para execução automatizada
    ports:
      - "8080:8080"
    command: standalone
    networks:
      - etl_network

  pgadmin:
    image: dpage/pgadmin4
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - pgadmin-volume:/var/lib/pgadmin
      - ./config/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./config/pgadmin/pgpass:/pgpass:ro
    networks:
      - etl_network


networks:
  etl_network:
    driver: bridge

volumes:
  postgres-db-volume:
  pgadmin-volume:
