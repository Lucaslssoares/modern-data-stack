etl:
  target: dev
  outputs:
    dev:
      type: postgres
      host:     "{{ env_var('DB_HOST', 'postgres') }}"
      port:     "{{ env_var('DB_PORT', '5432') | int }}"
      user:     "{{ env_var('DB_USER', 'airflow') }}"
      password: "{{ env_var('DB_PASSWORD') }}"
      dbname:   "{{ env_var('DB_NAME', 'airflow') }}"
      schema: public
      threads: 4
